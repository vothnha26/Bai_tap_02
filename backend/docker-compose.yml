version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: publicast_mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root_password
      MONGO_INITDB_DATABASE: publicast
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: publicast_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
